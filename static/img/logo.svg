<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- Gradiente Mint da Identidade PostFlow -->
    <linearGradient id="postFlowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#63D18F" />
      <stop offset="100%" stop-color="#35C177" />
    </linearGradient>
    
    <!-- Filtro de Glow Sutil para o Mint -->
    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fundo do Ícone (Soft Charcoal / Midnight Navy) com cantos arredondados -->
  <rect width="32" height="32" rx="10" fill="#161B23" stroke="#282E38" stroke-width="1.5"/>

  <!-- Símbolo dinâmico: Um "P" estilizado que flui para uma seta de publicação -->
  <!-- Base do post/feed (duas linhas de estrutura à esquerda) -->
  <rect x="7" y="8" width="18" height="16" rx="3" stroke="url(#postFlowGrad)" stroke-width="2" />
  
  <!-- Linhas internas simulando conteúdo do post -->
  <line x1="11" y1="13" x2="21" y2="13" stroke="url(#postFlowGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="11" y1="17" x2="17" y2="17" stroke="url(#postFlowGrad)" stroke-width="1.5" stroke-linecap="round" />

  <!-- Seta indicativa de "Flow" (Envio / Agendamento) saindo do post -->
  <path d="M20 20 L26 20 M26 20 L23 17 M26 20 L23 23" stroke="#63D18F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#iconGlow)" />
</svg>
