{% extends "base.html" %}

{% block title %}OAuth — {{ platform_label }} — PostFlow{% endblock %}

{% block content %}
<div class="card p-5 text-center" style="max-width: 560px; margin: 0 auto;">
  <h1 class="page-title mb-3">Conectar {{ platform_label }}</h1>
  <p class="text-muted mb-4">
    Fluxo OAuth simulado para desenvolvimento. Clique abaixo para autorizar a conexão mock.
  </p>
  <a href="{% url 'integrations:oauth_callback' platform %}?code=mock" class="btn btn-primary">
    Simular autorização
  </a>
  <div class="mt-3">
    <a href="{% url 'integrations:account_list' %}" class="btn btn-ghost btn-sm">Cancelar</a>
  </div>
</div>
{% endblock %}
