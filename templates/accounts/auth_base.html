{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PostFlow{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
</head>
<body>
  <div class="auth-layout">
    <a href="{% url 'landing' %}" class="auth-logo">
      <img src="{% static 'img/logo.svg' %}" width="40" height="40" alt="PostFlow Logo" class="me-2">
      <span>PostFlow</span>
    </a>

    <div class="auth-card card animate-in">
      {% block auth_card %}{% endblock %}
    </div>

    <p class="auth-footer text-muted">
      {% block auth_footer %}{% endblock %}
    </p>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
