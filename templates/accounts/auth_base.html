{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PostFlow{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>
  <div class="auth-layout">
    <a href="{% url 'landing' %}" class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect width="32" height="32" rx="10" fill="url(#auth-lg)"/>
        <path d="M8 16h6l3-6 3 12 3-6h1" stroke="oklch(18% 0.04 155)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="auth-lg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="oklch(78% 0.14 155)"/><stop offset="1" stop-color="oklch(68% 0.16 155)"/></linearGradient></defs>
      </svg>
      <span>PostFlow</span>
    </a>

    <div class="auth-card card animate-in">
      {% block auth_card %}{% endblock %}
    </div>

    <p class="auth-footer text-muted">
      {% block auth_footer %}{% endblock %}
    </p>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
